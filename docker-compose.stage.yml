services:
  web:
    restart: always
    build: .
    volumes:
      - .:/app
    ports:
      - "8001:8000"

    depends_on:
      db:
        condition: service_healthy
    # env_file:
    #   - .env.stage
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    command: >
      sh -c " python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --settings=core.settings.stage"

  db:
    image: postgres:17
    healthcheck:
       test: ["CMD-SHELL", "pg_isready -U web_user -d web_db"]
       interval: 5s
       timeout: 5s
       retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    
    volumes:
      - postgress_data_stage:/var/lib/postgresql/data

    
volumes:
  postgress_data_stage: