name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

     

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker image
        run: docker build -t myapp:latest .

      - name: Tag and push image
        run: |
          docker tag myapp:latest ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      # Save image info as artifact if needed
      - name: Save image tag for deployment
        run: echo "myapp:latest" > image.txt
        # Optional: upload artifact
        # uses: actions/upload-artifact@v3
        # with:
        #   name: docker-image
        #   path: image.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push   # This ensures deploy runs after build
    steps:
      - name: Checkout repo (optional if you need .env)
        uses: actions/checkout@v5

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Logging into Docker on EC2..."
            docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}

            echo "Stop and remove container if exists..."
            docker rm -f myapp-container || echo "No container found, skipping..."

            echo "Remove image if exists..."
            docker rmi ${{secrets.DOCKER_USERNAME}}/myapp:latest || echo "No image found"

            echo "Pulling the image..."
            docker pull ${{secrets.DOCKER_USERNAME}}/myapp:latest || true

            echo "Running container..."
            docker run -d -p 8000:8000 \
              --name myapp-container \
              --env-file .env \
              --network my_network \
              ${{secrets.DOCKER_USERNAME}}/myapp:latest