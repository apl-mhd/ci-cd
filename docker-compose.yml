services:
  web:
    image: aplmahmud/myapp:latest
    container_name: myapp-web
    restart: always
    # build: .
    # volumes:
    #   - .:/app
    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    command: >
      sh -c " python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --settings=core.settings.dev"

  db:
    image: postgres:17
    container_name: myapp-db
    healthcheck:
       test: ["CMD-SHELL", "pg_isready -U web_user -d web_db"]
       interval: 5s
       timeout: 5s
       retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data

    
volumes:
  postgres_data: